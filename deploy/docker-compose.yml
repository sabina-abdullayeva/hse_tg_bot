services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    command: python3 main.py
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
